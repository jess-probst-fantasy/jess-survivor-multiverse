<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#020617">
    <meta name="description" content="Tarus PC Tracker - Survivor Fantasy S50 Multiverse Production Build">
    <title>Survivor Fantasy: S50 Multiverse</title>
    
    <!-- External Dependencies -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        survivor: ['Bebas Neue', 'cursive'],
                        inter: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        cila: '#f97316', 
                        kalo: '#0ea5e9', 
                        vatu: '#a855f7',
                        slate: { 950: '#020617' }
                    }
                }

        }

    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --glass-bg: rgba(10, 15, 30, 0.98); }
        body { font-family: 'Inter', sans-serif; background-color: #020617; min-height: 100vh; color: white; overflow-x: hidden; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        .font-survivor { font-family: 'Bebas Neue', cursive; letter-spacing: 0.05em; }
        .glass-card { background: var(--glass-bg); backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.08); box-shadow: 0 15px 35px -5px rgba(0, 0, 0, 0.8); transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .glass-card:hover { border-color: rgba(245, 158, 11, 0.5); transform: translateY(-2px); }
        
        #fire-canvas { position: fixed; bottom: 0; left: 0; width: 100%; height: 45vh; pointer-events: none; z-index: -1; opacity: 0.5; mix-blend-mode: screen; }
        #embers-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: -2; opacity: 0.7; }
        
        .animate-slide-up { animation: slide-up 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes slide-up { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        
        .click-ripple { position: fixed; border-radius: 50%; background: radial-gradient(circle, rgba(245, 158, 11, 0.6) 0%, transparent 70%); pointer-events: none; width: 100px; height: 100px; transform: translate(-50%, -50%) scale(0); animation: ripple-effect 0.6s ease-out forwards; z-index: 9999; }
        @keyframes ripple-effect { 0% { transform: translate(-50%, -50%) scale(0); opacity: 1; } 100% { transform: translate(-50%, -50%) scale(2); opacity: 0; } }
        
        .commish-input, .commish-select, .commish-textarea { background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; padding: 12px; color: white; width: 100%; font-size: 14px; outline: none; }
        .commish-input:focus { border-color: #f59e0b; background: rgba(255, 255, 255, 0.05); }
        
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: rgba(245, 158, 11, 0.3); border-radius: 10px; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        #notification-center { position: fixed; top: 1rem; right: 1rem; z-index: 10000; pointer-events: none; }
        
        .flame-anim { animation: flicker 2s infinite alternate; }
        @keyframes flicker { 0% { opacity: 0.8; filter: drop-shadow(0 0 5px #f59e0b); } 100% { opacity: 1; filter: drop-shadow(0 0 20px #f97316); } }
    </style>
</head>

        // ==========================================

            { id: "coach", team: "Jess", tribe: "Cila", status: "Active" }, { id: "dee", team: "Jess", tribe: "Vatu", status: "Active" }, { id: "joe", team: "Jess", tribe: "Vatu", status: "Active" },
            { id: "jonathan", team: "Britt", tribe: "Kalo", status: "Active" }, { id: "ozzy", team: "Britt", tribe: "Kalo", status: "Active" }, { id: "emily", team: "Britt", tribe: "Cila", status: "Active" },
            { id: "colby", team: "Britt", tribe: "Vatu", status: "Active" }, { id: "q", team: "Britt", tribe: "Vatu", status: "Active" }, { id: "stephenie", team: "Britt", tribe: "Cila", status: "Active" },

            { id: "cirie", team: "Ken", tribe: "Kalo", status: "Active" }, { id: "genevieve", team: "Ken", tribe: "Kalo", status: "Active" }, { id: "jenna", team: "Ken", tribe: "Vatu", status: "Active" }
        ];

        window.MASTER_BIOS = {
            "rizo": { name: "Rizo", job: "Strategist", origin: "Florida", firstSeason: "S49", archetype: "Architect", outlook: "High-risk social manipulator.", challengesWon: 4, timesInChallenge: 12, bio: "The 'Rizgod' returns.", strengths: "Social reading", weaknesses: "Threat level" },
            "kamilla": { name: "Kamilla", job: "Software Engineer", origin: "Mass.", firstSeason: "S49", archetype: "Logic Engine", outlook: "Interactions like logic gates.", challengesWon: 7, timesInChallenge: 15, bio: "Clinical strategist.", strengths: "Puzzles", weaknesses: "Empathy" },
            "rick": { name: "Rick Devens", job: "Anchor", origin: "Georgia", firstSeason: "S38", archetype: "Showman", outlook: "Expect idol chaos.", challengesWon: 4, timesInChallenge: 14, bio: "Legend of S38.", strengths: "Finding idols", weaknesses: "Visibility" },

            "jonathan": { name: "Jonathan Young", job: "Titan", origin: "Alabama", firstSeason: "S42", archetype: "The Shield", outlook: "Raw power.", challengesWon: 8, timesInChallenge: 14, bio: "Titan swimmer.", strengths: "Raw Power", weaknesses: "Nuance" },

            "coach": { name: "Coach Wade", job: "Maestro", origin: "California", firstSeason: "S18", archetype: "Dragonslayer", outlook: "Honor and lore.", challengesWon: 5, timesInChallenge: 22, bio: "Philosophical legend.", strengths: "Leadership", weaknesses: "Ego" },
            "cirie": { name: "Cirie Fields", job: "Nurse", origin: "S. Carolina", firstSeason: "S12", archetype: "The Oracle", outlook: "Master of 3-2-1.", challengesWon: 2, timesInChallenge: 35, bio: "Master manipulator.", strengths: "Nuance", weaknesses: "Physical" },
            "aubry": { name: "Aubry Bracco", job: "Analyst", origin: "N. Hampshire", firstSeason: "S32", archetype: "Protagonist", outlook: "Resilient master.", challengesWon: 4, timesInChallenge: 25, bio: "Chaos master.", strengths: "Narrative", weaknesses: "Anxiety" },
            "colby": { name: "Colby Donaldson", job: "Actor", origin: "Texas", firstSeason: "S2", archetype: "Hero", outlook: "Original standard.", challengesWon: 9, timesInChallenge: 30, bio: "Original Survivor hero.", strengths: "Honor", weaknesses: "Pacing" },
            "q": { name: "Q Burdette", job: "Agent", origin: "Mississippi", firstSeason: "S46", archetype: "Agent", outlook: "Chaos merchant.", challengesWon: 2, timesInChallenge: 12, bio: "BIG MISTAKE!", strengths: "Chaos", weaknesses: "Volatility" },
            "chrissy": { name: "Chrissy Hofbeck", job: "Actuary", origin: "N. Jersey", firstSeason: "S35", archetype: "Actuary", outlook: "Math logic wins.", challengesWon: 4, timesInChallenge: 14, bio: "Calculation queen.", strengths: "Math", weaknesses: "Warmth" },
            "tiffany": { name: "Tiffany Ervin", job: "Artist", origin: "N. Jersey", firstSeason: "S46", archetype: "Intuitive", outlook: "Heart-first play.", challengesWon: 2, timesInChallenge: 11, bio: "Yanu heart.", strengths: "Loyalty", weaknesses: "Intensity" },
            "kyle": { name: "Kyle Kenji", job: "Trainer", origin: "California", firstSeason: "S48", archetype: "Titan", outlook: "Pure endurance.", challengesWon: 6, timesInChallenge: 15, bio: "S48 winner.", strengths: "Work ethic", weaknesses: "Complexity" },
            "stephenie": { name: "Stephenie LaGrossa", job: "Survivor", origin: "N. Jersey", firstSeason: "S10", archetype: "Underdog", outlook: "Never gives up.", challengesWon: 3, timesInChallenge: 24, bio: "Ulong icon.", strengths: "Fire", weaknesses: "Friction" },
            "genevieve": { name: "Genevieve", job: "Lawyer", origin: "Canada", firstSeason: "S47", archetype: "Assassin", outlook: "Hidden strategist.", challengesWon: 1, timesInChallenge: 10, bio: "Quiet assassin.", strengths: "Observation", weaknesses: "Visibility" },
            "joe": { name: "Joe Anglim", job: "Artist", origin: "Arizona", firstSeason: "S30", archetype: "Provider", outlook: "Heart of tribe.", challengesWon: 6, timesInChallenge: 14, bio: "Physical icon.", strengths: "Balance", weaknesses: "Strategy" },
            "jenna": { name: "Jenna Morasca", job: "Model", origin: "Pennsylvania", firstSeason: "S6", archetype: "Icon", outlook: "Immunity expert.", challengesWon: 3, timesInChallenge: 18, bio: "Amazon winner.", strengths: "Poise", weaknesses: "Mood" }
        };

        const INITIAL_MATRIX = [
            { category: "Point opportunities", actions: [
                { name: "Sole Survivor", points: 20, desc: "Crowned winner of S50." },
                { name: "MVP Bonus", points: 10, desc: "Designated MVP of the week." },
                { name: "Runner Ups", points: 10, desc: "Reached Final Tribal." },
                { name: "Win Fire Making", points: 3, desc: "Wins F4 Fire-making." },
                { name: "On The Jury", points: 2, desc: "Reached the Jury." },
                { name: "Individual Merge", points: 1, desc: "Reached individual merge." },
                { name: "First Person Out", points: -2, desc: "First person voted out." }
            ]},
            { category: "Tribal Points", actions: [
                { name: "Uses SITD", points: 2, desc: "Plays Shot in the Dark." },
                { name: "SITD Correctly", points: 2, desc: "SITD makes them safe." },
                { name: "Advantage Correctly", points: 10, desc: "Successfully uses advantage." },
                { name: "No Vote Available", points: -2, desc: "Tribal with no vote." },
                { name: "Plays Idol for Ally", points: 2, desc: "Protects another castaway." },
                { name: "Idol in Pocket", points: -5, desc: "Voted out with idol." },
                { name: "Advantage in Pocket", points: -2, desc: "Voted out with advantage." }
            ]},
            { category: "Camp Life Points", actions: [
                { name: "Finds Hidden Idol", points: 4, desc: "Locates immunity idol." },
                { name: "Additional Idols", points: 2, desc: "Finds subsequent idols." },
                { name: "Goes Through Bag", points: 1, desc: "Searches opponent's bag." },
                { name: "Bag Search Victim", points: -1, desc: "Owner of searched bag." },
                { name: "Makes Fake Idol", points: 2, desc: "Crafts realistic fake." },
                { name: "Uses Fake Idol", points: -2, desc: "Tries to play a fake idol." },
                { name: "Makes First Fire", points: 1, desc: "Creates first tribe fire." }
            ]},
            { category: "Challenge Points", actions: [
                { name: "Winning Tribe", points: 2, desc: "On winning tribe (not benched)." },
                { name: "Wins Ind. Immunity", points: 3, desc: "Wins individual necklace." },
                { name: "Jeff Bribe", points: -2, desc: "Takes bribe from Jeff." },
                { name: "Family Reward", points: 1, desc: "Goes on family reward." },
                { name: "Sanctuary Advantage", points: 4, desc: "Advantage at sanctuary." }
            ]},
            { category: "Anytime Points", actions: [
                { name: "Gives Jeff Shit", points: 1, desc: "Talking back to Jeff." },
                { name: "Calls Jeff Uncle", points: -1, desc: "Using nickname." },
                { name: "Needs Medical", points: -1, desc: "Requires medical team." }
            ]}
        ];

        window.state = {
            theme: 'dark', showSplash: true, currentUser: 'Viewer', activeTab: 'home',
            viewingTeamId: null, editingPlayerId: window.MASTER_ROSTER[0].id,
            players: window.MASTER_ROSTER,
            playerBios: window.MASTER_BIOS,
            pointSystem: INITIAL_MATRIX,
            actions: [],
            teamNames: { Ian: "Ian's Idols", Jess: "Jess's Juggernauts", Britt: "Britt's Beasts", Ken: "Ken's Kings" },
            trivia: { seenIds: [], feedback: null }
        };

        // ==========================================
        // [2] CORE LOGIC FUNCTIONS (SECTION B)
        // ==========================================

        const notify = (msg, type = 'info') => {
            const container = document.getElementById('notification-center');
            if (!container) return;
            const note = document.createElement('div');
            note.className = `glass-card p-4 rounded-2xl mb-2 text-[10px] font-black uppercase border-l-4 ${type === 'error' ? 'border-red-500' : 'border-amber-500'} animate-slide-up pointer-events-auto shadow-2xl`;
            note.innerText = msg;
            container.appendChild(note);
            setTimeout(() => { note.style.opacity = '0'; setTimeout(() => note.remove(), 500); }, 3500);
        };

        const getTribeStyle = (tribe) => {
            const map = { 'Cila': { bg: 'bg-cila', text: 'text-cila' }, 'Kalo': { bg: 'bg-kalo', text: 'text-kalo' }, 'Vatu': { bg: 'bg-vatu', text: 'text-vatu' } };
            return map[tribe] || { bg: 'bg-slate-500', text: 'text-slate-500' };
        };

        // ==========================================
        // [3] MAIN UI RENDERING ENGINE (SECTION C)
        // ==========================================

        window.updateAppUI = function() {
            const root = document.getElementById('app');
            if (!root || !window.state) return;

            if (window.state.showSplash) { root.innerHTML = renderSplash(); return; }
            if (window.state.currentUser === 'Viewer') { root.innerHTML = renderUserSelect(); return; }

            const playerScores = {};
            window.state.players.forEach(p => playerScores[p.id] = 0);
            window.state.actions.forEach(a => { if(playerScores[a.playerId] !== undefined) playerScores[a.playerId] += a.points; });
            const teamTotals = { Ian: 0, Jess: 0, Britt: 0, Ken: 0 };
            window.state.players.forEach(p => teamTotals[p.team] += (playerScores[p.id] || 0));
            const sortedTeams = Object.entries(teamTotals).map(([team, score]) => ({ team, score })).sort((a,b) => b.score - a.score);

            let mainContent = '';
            if (window.state.viewingTeamId) {
                mainContent = renderWarRoom(window.state.viewingTeamId, playerScores);
            } else {
                const t = window.state.activeTab;
                if (t === 'home') mainContent = renderHome(sortedTeams, playerScores);
                else if (t === 'tribes') mainContent = renderTribes(playerScores);
                else if (t === 'guide') mainContent = renderRules();
                else if (t === 'trivia') mainContent = renderTrivia();
                else if (t === 'commissioner') mainContent = renderCommissioner();
            }

            root.innerHTML = `
                <div class="max-w-7xl mx-auto px-6 py-8 pb-32 text-white">
                    <header class="flex flex-col md:flex-row justify-between items-center mb-12 gap-6 border-b border-white/5 pb-8 animate-slide-up">
                        <div class="flex items-center gap-4"><i class="fa-solid fa-fire text-5xl text-amber-500 flame-anim"></i><div><h1 class="text-4xl md:text-5xl font-survivor font-black uppercase text-left">Multiverse S50</h1><p class="text-[9px] text-slate-500 tracking-[0.4em] font-black uppercase text-left">Principal Architect Build</p></div></div>
                        <div class="flex items-center gap-3">
                            <button id="switch-user" class="glass-card px-6 py-3 rounded-full text-[10px] font-black uppercase tracking-widest hover:border-amber-500/50 transition-all"><i class="fa-solid fa-user-circle mr-2 text-amber-500"></i> ${window.state.currentUser}</button>
                        </div>
                    </header>
                    ${mainContent}
                    <nav class="fixed bottom-0 inset-x-0 glass-card p-4 pb-safe z-[150] border-t border-white/10 text-white text-center">
                        <div class="max-w-xl mx-auto flex justify-between items-center overflow-x-auto hide-scrollbar px-2">
                            ${['home','tribes','guide','trivia','commissioner'].filter(id => id !== 'commissioner' || window.state.currentUser === 'Jess').map(id => `
                                <button data-tab="${id}" class="flex flex-col items-center gap-1.5 ${window.state.activeTab === id && !window.state.viewingTeamId ? 'text-amber-500' : 'text-slate-500'} transition-colors px-3 min-w-[50px] text-center"><i class="fa-solid ${id==='home'?'fa-house':id==='tribes'?'fa-campground':id==='guide'?'fa-map':id==='trivia'?'fa-brain':'fa-shield'} text-lg"></i><span class="text-[7px] font-black uppercase tracking-widest text-center block w-full">${id === 'guide' ? 'RULES' : id.toUpperCase()}</span></button>`).join('')}
                        </div>
                    </nav>
                    ${renderPlayerModal()}
                </div>`;
        };

        // --- SUB-RENDERERS ---

        function renderSplash() {
            return `<div class="fixed inset-0 bg-slate-950 flex flex-col items-center justify-center p-6 text-white text-center z-[250] animate-slide-up">
                <i class="fa-solid fa-fire text-8xl text-amber-500 mb-8 flame-anim"></i>
                <h1 class="text-7xl font-survivor tracking-tighter mb-12 uppercase font-black">Fantasy <span class="text-amber-500">Survivor</span></h1>
                <button id="start-btn" class="glass-card px-12 py-6 rounded-[30px] border border-white/10 hover:border-amber-500 transition-all font-survivor text-3xl uppercase tracking-widest">Launch Multiverse</button>
            </div>`;
        }

        function renderUserSelect() {
            return `<div class="fixed inset-0 bg-black/95 flex items-center justify-center z-[250] p-6 animate-slide-up">
                <div class="bg-slate-950 rounded-[50px] p-10 max-w-md w-full text-center border border-slate-800 shadow-2xl">
                    <h2 class="text-5xl font-survivor text-amber-500 tracking-widest mb-10 uppercase">Identity</h2>
                    <div class="grid grid-cols-2 gap-4">
                        ${Object.keys(window.state.teamNames).map(u => `<button data-user="${u}" class="glass-card p-6 rounded-[35px] hover:border-amber-500 transition-all flex flex-col items-center gap-4 text-center text-white font-black text-[10px] tracking-widest uppercase"><div class="w-16 h-16 rounded-full bg-amber-500 flex items-center justify-center font-survivor text-4xl text-white shadow-xl">${u[0]}</div>${window.state.teamNames[u]}</button>`).join('')}
                    </div>
                </div>
            </div>`;
        }

        function renderHome(sortedTeams, playerScores) {
            const teamPlayers = window.state.players.filter(p => p.team === window.state.currentUser);
            return `<div class="animate-slide-up">
                <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-12 text-center">
                    ${sortedTeams.map((t, i) => `
                        <button data-view-team="${t.team}" class="glass-card p-6 rounded-[35px] border-t-8 ${i===0?'border-amber-500':'border-transparent'} relative text-center hover:scale-105 transition-transform group">
                            <span class="text-[8px] font-black uppercase text-slate-500 block mb-2 group-hover:text-amber-500">${window.state.teamNames[t.team]}</span>
                            <div class="text-4xl font-survivor fire-text mb-1 text-center">${t.score}</div>
                            <div class="text-[7px] font-bold text-slate-400 uppercase tracking-widest text-center">Open War Room</div>
                        </button>`).join('')}
                </div>
                <div class="glass-card p-8 rounded-[40px]">
                    <h2 class="font-survivor text-3xl uppercase mb-6 flex gap-3 items-center text-white text-left"><i class="fa-solid fa-user-gear text-amber-500"></i> ${window.state.teamNames[window.state.currentUser].toUpperCase()}'S DASH</h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-3 text-left">
                        ${teamPlayers.map(p => {

        function initFX() {
            const fCanvas = document.getElementById('fire-canvas'), eCanvas = document.getElementById('embers-canvas');
            if (!fCanvas || !eCanvas) return;
            const fCtx = fCanvas.getContext('2d'), eCtx = eCanvas.getContext('2d');
            let w, h, embers = [];
            const resize = () => { w = fCanvas.width = eCanvas.width = window.innerWidth; h = fCanvas.height = eCanvas.height = window.innerHeight; };
            window.addEventListener('resize', resize); resize();
            class Ember {
                constructor() { this.reset(); }
                reset() { this.x = Math.random() * w; this.y = h + 10; this.vx = (Math.random() - 0.5) * 1.5; this.vy = -(Math.random() * 2 + 0.5); this.life = Math.random() * 0.5 + 0.5; this.size = Math.random() * 2 + 1; }
                update() { this.x += this.vx; this.y += this.vy; this.life -= 0.003; if (this.life <= 0 || this.y < 0) this.reset(); }
                draw() { eCtx.beginPath(); eCtx.arc(this.x, this.y, this.size, 0, Math.PI * 2); eCtx.fillStyle = `rgba(245, 158, 11, ${this.life})`; eCtx.fill(); }
            }
            for(let i=0; i<40; i++) embers.push(new Ember());
            const loop = () => {
                fCtx.clearRect(0,0,w,h);
                const grad = fCtx.createLinearGradient(0, h, 0, h - 300);
                grad.addColorStop(0, 'rgba(234, 88, 12, 0.4)'); grad.addColorStop(1, 'transparent');
                fCtx.fillStyle = grad; fCtx.fillRect(0, h-300, w, 300);
                eCtx.clearRect(0,0,w,h); embers.forEach(e => { e.update(); e.draw(); });
                requestAnimationFrame(loop);
            };
            loop();
        }

                b.challengesWon = parseInt(document.getElementById('commish-wins-input').value);
                b.outlook = document.getElementById('commish-bio-textarea').value;
                b.bio = document.getElementById('commish-longbio-input').value;
                if (window.db) { setDoc(doc(window.db, 'artifacts', window.appId, 'public', 'data', 'gameConfig', 'main'), window.state).then(() => notify("Cloud Dossier Updated")); } 
                else { window.updateAppUI(); }
                return;
            }
            if (t.closest('#save-teams')) {
                document.querySelectorAll('[data-team-key]').forEach(inp => { window.state.teamNames[inp.dataset.teamKey] = inp.value; });
                if (window.db) { setDoc(doc(window.db, 'artifacts', window.appId, 'public', 'data', 'gameConfig', 'main'), window.state).then(() => notify("Branding Synchronized")); } 
                else { window.updateAppUI(); }
                return;
            }
            if (t.closest('#clear-actions')) {
                if (confirm("Permanently wipe all season moves?")) {
                    if (window.db) {
                        getDocs(collection(window.db, 'artifacts', window.appId, 'public', 'data', 'actions')).then(snap => {
                            snap.docs.forEach(d => deleteDoc(doc(window.db, 'artifacts', window.appId, 'public', 'data', 'actions', d.id)));
                        });
                    } else { window.state.actions = []; window.updateAppUI(); }
                }
                return;
            }
        });

        document.addEventListener('change', (e) => { 
            if (e.target.id === 'commish-player-select') { window.state.editingPlayerId = e.target.value; window.updateAppUI(); }
        });

        window.addEventListener('DOMContentLoaded', () => {
            initFX();
            if (typeof window.updateAppUI === "function") window.updateAppUI(); 
            initSyncEngine();
        });
    </script>
</body>
</html>

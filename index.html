        function playFireSnap() {
            if (!state.soundEnabled) return;
            initAudio();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(150, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.1);
        }

        function playTribalDrum(freq, type, gainVal, time, decay = 0.4) {
            initAudio();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, time);
            
            if (freq < 100) {
                osc.frequency.exponentialRampToValueAtTime(freq * 0.8, time + decay);
            } else {
                osc.frequency.exponentialRampToValueAtTime(0.01, time + decay);
            }
            
            gain.gain.setValueAtTime(gainVal, time);
            gain.gain.exponentialRampToValueAtTime(0.01, time + decay);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(time); osc.stop(time + decay);
        }

        function startMusicLoop() {
            if (!state.musicEnabled) return;
            initAudio();
            let beat = 0;
            musicInterval = setInterval(() => {
                const now = audioCtx.currentTime;
                // Survivor Tribal Council Tension Rhythm
                if (beat % 8 === 0) playTribalDrum(40, 'sine', 0.8, now, 1.2);
                if (beat % 8 === 7) playTribalDrum(45, 'sine', 0.5, now, 0.8);
                if (beat % 2 === 0) playTribalDrum(1200, 'square', 0.02, now, 0.05); 
                if (beat % 4 === 2) playTribalDrum(900, 'square', 0.015, now, 0.05);
                
                if (beat % 16 === 0) {
                    const breathOsc = audioCtx.createOscillator();
                    const breathGain = audioCtx.createGain();
                    breathOsc.type = 'triangle';
                    breathOsc.frequency.setValueAtTime(329.63, now); 
                    breathGain.gain.setValueAtTime(0, now);
                    breathGain.gain.linearRampToValueAtTime(0.05, now + 1);
                    breathGain.gain.linearRampToValueAtTime(0, now + 3);
                    breathOsc.connect(breathGain); breathGain.connect(audioCtx.destination);
                    breathOsc.start(now); breathOsc.stop(now + 3);
                }
                beat = (beat + 1) % 16;
            }, 300); 
        }

            if (s === '50') return JSON.parse(JSON.stringify(DEFAULT_PLAYERS_S50));

            return roster;
        }

        // ==========================================
        function initCanvasEmbers() {
            const canvas = document.getElementById('embers-canvas');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            let width, height;
            let particles = [];

            function resize() {
                width = canvas.width = window.innerWidth;
                height = canvas.height = window.innerHeight;
            }
            window.addEventListener('resize', resize);
            resize();

            class Particle {
                constructor() {
                    this.x = Math.random() * width;
                    this.y = height + Math.random() * 100;
                    this.vx = (Math.random() - 0.5) * 1;
                    this.vy = -(Math.random() * 1.5 + 0.5);
                    this.size = Math.random() * 3 + 1;
                    this.life = Math.random() * 0.5 + 0.5;
                }
                update() {
                    this.x += this.vx;
                    this.y += this.vy;
                    this.life -= 0.003;
                    if (this.y < 0 || this.life <= 0) {
                        this.y = height + 10;
                        this.x = Math.random() * width;
                        this.life = Math.random() * 0.5 + 0.5;
                    }
                }
                draw() {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(245, 158, 11, ${this.life * (state.theme === 'dark' ? 0.8 : 0.2)})`;
                    ctx.fill();
                }
            }

            for (let i = 0; i < 40; i++) particles.push(new Particle());

            function animate() {
                ctx.clearRect(0, 0, width, height);
                particles.forEach(p => { p.update(); p.draw(); });
                requestAnimationFrame(animate);
            }
            animate();
        }

        function setup3DTilt() {
            if (window.innerWidth < 768) return; 
            document.querySelectorAll('.tilt-card').forEach(card => {
                card.addEventListener('mousemove', e => {
                    const rect = card.getBoundingClientRect();
                    const x = e.clientX - rect.left;
                    const y = e.clientY - rect.top;
                    const centerX = rect.width / 2;
                    const centerY = rect.height / 2;
                    const rotateX = ((y - centerY) / centerY) * -5;
                    const rotateY = ((x - centerX) / centerX) * 5;
                    card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale3d(1.02, 1.02, 1.02)`;
                });
                card.addEventListener('mouseleave', () => {
                    card.style.transform = `perspective(1000px) rotateX(0) rotateY(0) scale3d(1, 1, 1)`;
                });
            });
        }

                         </div>
                    </div>

                    <div class="glass-card p-6 md:p-12 rounded-[40px] md:rounded-[55px] shadow-2xl premium-shadow border-l-[10px] md:border-l-[15px] border-red-600 tilt-card">
                         <h3 class="text-xl md:text-2xl font-survivor mb-2 md:mb-4 text-red-600 uppercase">4. SEASON HARD RESET</h3>
                         <p class="text-[10px] md:text-sm text-slate-500 font-bold mb-6 md:mb-8 uppercase tracking-widest opacity-80">ERASE ALL Verified Records for S${state.currentSeason}. This cannot be undone.</p>
                         <button id="hard-reset-btn" class="w-full md:w-auto bg-red-600 text-white font-black py-4 md:py-5 px-8 md:px-12 rounded-[25px] md:rounded-[30px] text-xs md:text-sm tracking-widest shadow-xl hover:bg-red-700 transition-all active:scale-95 uppercase">ERASE ALL DATA</button>
                    </div>
                </div>
            `;
        }

        function renderPlayerModal(scores) {
            const p = state.players.find(x => x.id === state.selectedPlayerForModal);
            if (!p) return '';
            const bio = PLAYER_BIOS[p.id] || { bio: "Historical dossier encrypted.", seasons: "Unknown Expedition", gamesPlayed: 1, wins: 0, archetype: "Unknown" };
            const tColor = getTribeColorClasses(p.tribe);
            const avatarHtml = getAvatarHTML(p, "w-20 h-20 md:w-24 md:h-24", "text-3xl md:text-4xl", tColor);
            
            return `
                <div id="player-modal-backdrop" class="fixed inset-0 bg-black/95 z-[200] flex items-center justify-center p-4 md:p-6 animate-fade-in no-ripple">
                    <div class="bg-white dark:bg-slate-900 rounded-[35px] md:rounded-[55px] max-w-sm w-[95%] md:w-full p-8 md:p-12 relative shadow-[0_0_80px_rgba(245,158,11,0.3)] border border-white/5 border-t-[10px] ${tColor.border} tilt-card max-h-[90vh] overflow-y-auto hide-scrollbar">
                        <button id="close-player-modal" class="absolute top-4 right-4 md:top-8 md:right-8 text-slate-400 hover:text-white transition-colors p-2"><i class="fa-solid fa-xmark text-2xl md:text-3xl"></i></button>
                        <div class="text-center">
                            <div class="flex justify-center mb-6 md:mb-8">${avatarHtml}</div>
                            <h3 class="text-3xl md:text-4xl font-survivor text-slate-800 dark:text-white uppercase leading-none font-black">${p.name}</h3>
                            <div class="text-7xl md:text-8xl font-black text-amber-500 mt-4 mb-2 md:mt-6 md:mb-4 drop-shadow-xl font-survivor anim-number">${scores[p.id] || 0}</div>
                            <div class="text-[9px] md:text-[10px] font-black text-slate-500 uppercase tracking-widest mb-6 md:mb-8">Current XP</div>
                            
                            <div class="flex justify-center gap-6 md:gap-10 mb-6 md:mb-8 border-b border-slate-200 dark:border-slate-800 pb-6 md:pb-8 mt-2 md:mt-4">
                                <div class="text-center"><div class="text-3xl md:text-4xl font-black text-slate-800 dark:text-white font-survivor">${bio.gamesPlayed}</div><div class="text-[8px] md:text-[9px] uppercase tracking-widest text-slate-500 font-bold mt-1">Games Played</div></div>
                                <div class="text-center"><div class="text-3xl md:text-4xl font-black text-amber-500 font-survivor">${bio.wins}</div><div class="text-[8px] md:text-[9px] uppercase tracking-widest text-slate-500 font-bold mt-1">Seasons Won</div></div>
                            </div>
                            
                            <div class="mb-6 md:mb-8">
                                <div class="text-[9px] md:text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Seasons Competed</div>
                                <div class="text-xs md:text-sm font-black text-slate-800 dark:text-white uppercase tracking-widest">${bio.seasons}</div>
                            </div>
                            
                            <p class="text-[10px] md:text-xs font-bold text-slate-500 uppercase tracking-widest mb-8 md:mb-10 leading-relaxed">${bio.bio}</p>
                            
                            <div class="flex flex-col gap-2 md:gap-3 items-center">
                                <div class="text-[9px] md:text-[10px] font-black ${tColor.text} border-2 ${tColor.border} rounded-full px-5 md:px-6 py-2 md:py-2.5 inline-block uppercase tracking-widest bg-slate-100 dark:bg-slate-800/50">ARCHETYPE: ${bio.archetype || 'Unknown'}</div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderBottomNav() {
            const pendingCount = state.actions.filter(a => a.status === 'pending').length;
            const needsBadge = (state.currentUser === 'Jess' && pendingCount > 0);
            const tabs = [
                {id:'dashboard', icon:'fa-house', label:'Home'}, 
                {id:'tribes', icon:'fa-campground', label:'Tribes'},
                {id:'log', icon:'fa-fire-flame-curved', label:'Log'}, 
                {id:'feed', icon:'fa-history', label:'History'}, 
                {id:'trivia', icon:'fa-puzzle-piece', label:'Trivia'}, 
                {id:'tutorial', icon:'fa-map', label:'Guide'}
            ];
            if(state.currentUser === 'Jess') tabs.push({id:'admin', icon:'fa-shield-halved', label:'Commish'});
            return `
                <div class="fixed bottom-0 inset-x-0 glass-card border-t border-slate-200 dark:border-slate-800 z-40 pb-safe pt-2 md:pt-3 shadow-[0_-10px_40px_rgba(0,0,0,0.1)]">
                    <div class="max-w-lg mx-auto flex justify-between h-14 md:h-16 px-2 md:px-4 overflow-x-auto hide-scrollbar gap-1 md:gap-2">
                        ${tabs.map(t => `
                            <button data-tab="${t.id}" class="relative flex flex-col items-center justify-center min-w-[45px] md:min-w-[50px] ${state.activeTab === t.id ? 'text-amber-500 scale-110 md:scale-125 translate-y-[-8px] md:translate-y-[-12px]' : 'text-slate-400 hover:text-slate-600 dark:hover:text-slate-200'} transition-all duration-300 ease-out shrink-0">
                                ${t.id === 'feed' && needsBadge ? '<span class="absolute top-0 right-1 w-3 h-3 md:w-4 md:h-4 bg-red-600 rounded-full border-2 md:border-4 border-white dark:border-slate-900 animate-pulse shadow-xl"></span>' : ''}
                                <i class="fa-solid ${t.icon} text-base md:text-lg mb-1 md:mb-1.5 drop-shadow-md"></i>
                                <span class="text-[7px] md:text-[8px] font-black uppercase tracking-tighter">${t.label}</span>
                                ${state.activeTab === t.id ? '<div class="w-1 h-1 md:w-1.5 md:h-1.5 bg-amber-500 rounded-full mt-1 md:mt-1.5 animate-fire"></div>' : ''}
                            </button>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        // ==========================================
        // 7. CORE RENDER ENGINE
        // ==========================================
        function updateAppUI() {
            const root = document.getElementById('app');
            if (!root) return;
            if (state.showSplash) { root.innerHTML = renderSplash() + (state.showUserSelectModal ? renderUserSelectModal() : ''); setup3DTilt(); return; }
            
            const playerScores = {};
            state.players.forEach(p => playerScores[p.id] = 0);
            state.actions.forEach(a => { if (a.status === 'approved' && playerScores[a.playerId] !== undefined) playerScores[a.playerId] += a.points; });
            const teamScores = { Ian: 0, Jess: 0, Britt: 0, Ken: 0 };
            state.players.forEach(p => { if(teamScores[p.team] !== undefined) teamScores[p.team] += (playerScores[p.id] || 0); });
            const sortedTeams = Object.entries(teamScores).map(([team, score]) => ({ team, score })).sort((a, b) => b.score - a.score);

            let contentHTML = renderHeader() + '<main class="mt-8 md:mt-12">';
            if (state.activeTab === 'dashboard' && !state.selectedTeam) contentHTML += renderDashboard(sortedTeams, playerScores);
            if (state.activeTab === 'dashboard' && state.selectedTeam) contentHTML += renderTeamDashboard(state.selectedTeam, playerScores, teamScores);
            if (state.activeTab === 'tribes') contentHTML += renderTribes(playerScores);
            if (state.activeTab === 'log') contentHTML += renderLogPoints();
            if (state.activeTab === 'feed') contentHTML += renderActivityFeed();
            if (state.activeTab === 'trivia') contentHTML += renderTrivia();
            if (state.activeTab === 'tutorial') contentHTML += renderTutorial();
            if (state.activeTab === 'admin' && state.currentUser === 'Jess') contentHTML += renderAdmin();
            contentHTML += '</main>';
            
            if (state.selectedPlayerForModal) contentHTML += renderPlayerModal(playerScores);
            if (state.toast) contentHTML += '<div class="fixed top-6 md:top-8 left-1/2 -translate-x-1/2 z-[300] bg-slate-900 text-white px-8 md:px-10 py-4 md:py-5 rounded-full border-2 border-amber-500 font-black uppercase text-[10px] md:text-xs animate-fade-in shadow-2xl tracking-widest whitespace-nowrap">' + state.toast.msg + '</div>';
            
            contentHTML += renderBottomNav();
            
            root.innerHTML = '<div class="max-w-7xl mx-auto px-4 md:px-6 py-6 md:py-8 pb-32 md:pb-40">' + contentHTML + '</div>';
            
            setup3DTilt();
        }

        window.render = updateAppUI;

        // ==========================================
        // 8. FIREBASE & LOCAL STORAGE INIT
        // ==========================================
        function subscribeToSeason(s) {
            const suf = getSuffix(s);
            if (state.isDemoMode) { updateAppUI(); return; }
            onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'roster' + suf), d => {
                state.players = d.exists() ? d.data().players : generateGenericRoster(s);
                updateAppUI();
            });
            onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'teamNames' + suf), d => {
                state.teamNames = d.exists() ? d.data().names : { Ian: "Ian", Jess: "Jess", Britt: "Britt", Ken: "Ken" };
                updateAppUI();
            });
            onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'rules' + suf), d => {
                if (d.exists()) state.pointSystem = d.data().matrix;
                updateAppUI();
            });
            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'actions' + suf), snap => {
                state.actions = snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b) => b.timestamp - a.timestamp);
                updateAppUI();
            });
        }

        function initListeners() {
            if (state.isDemoMode) { updateAppUI(); return; }
            onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'global_meta'), d => {
                if (d.exists()) state.activeSeasons = d.data().activeSeasons || ['50'];
                updateAppUI();
            });
            onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'trivia_stats'), d => {
                if (d.exists()) state.triviaLeaderboard = d.data().leaderboard || {};
                updateAppUI();
            });
            subscribeToSeason(state.currentSeason);
        }

        async function initApp() {
            initCanvasEmbers(); 
            if (!firebaseConfigStr) { 
                state.isDemoMode = true; 
                initListeners();
                return; 
            }
            try {
                const config = JSON.parse(firebaseConfigStr);
                const fbApp = initializeApp(config);
                auth = getAuth(fbApp); db = getFirestore(fbApp);
                onAuthStateChanged(auth, async (user) => {
                    if (!user) {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) await signInWithCustomToken(auth, __initial_auth_token);
                        else await signInAnonymously(auth);
                    } else {
                        initListeners();
                        if (state.musicEnabled) startMusicLoop();
                    }
                });
            } catch (e) { 
                state.isDemoMode = true; 
                initListeners();
            }
        }

        // ==========================================
        // 9. EVENT ROUTING
        // ==========================================
        document.addEventListener('click', (e) => {
            if (!e.target.closest('input') && !e.target.closest('select')) {
                playFireSnap();
                if (e.clientX !== undefined) {
                    const ripple = document.createElement('div');
                    ripple.className = 'click-ripple'; ripple.style.left = `${e.clientX}px`; ripple.style.top = `${e.clientY}px`;
                    document.body.appendChild(ripple); setTimeout(() => ripple.remove(), 500);
                }
            }
            
            if (e.target.closest('[data-switch-season]')) { state.pendingSeason = e.target.closest('[data-switch-season]').dataset.switchSeason; state.showUserSelectModal = true; updateAppUI(); }
            if (e.target.closest('[data-select-user]')) {
                state.currentUser = e.target.closest('[data-select-user]').dataset.selectUser;
                state.currentSeason = state.pendingSeason;
                state.showUserSelectModal = false; state.showSplash = false;
                subscribeToSeason(state.currentSeason);
                updateAppUI();
            }
            if (e.target.closest('[data-tab]')) { state.activeTab = e.target.closest('[data-tab]').dataset.tab; state.selectedTeam = null; updateAppUI(); }
            if (e.target.closest('#theme-toggle-btn')) {
                state.theme = state.theme === 'dark' ? 'light' : 'dark';
                localStorage.setItem('survivorTheme', state.theme);
                document.documentElement.classList.toggle('dark'); updateAppUI();
            }
            if (e.target.closest('#sound-toggle-btn')) { state.soundEnabled = !state.soundEnabled; localStorage.setItem('survivorSound', state.soundEnabled); updateAppUI(); }
            if (e.target.closest('#music-toggle-btn')) toggleMusic();
            if (e.target.closest('[data-team-card]')) { state.selectedTeam = e.target.closest('[data-team-card]').dataset.teamCard; updateAppUI(); }
            if (e.target.closest('#back-to-dashboard')) { state.selectedTeam = null; updateAppUI(); }
            if (e.target.closest('[data-player-modal]')) { state.selectedPlayerForModal = e.target.closest('[data-player-modal]').dataset.playerModal; updateAppUI(); }
            if (e.target.closest('#close-player-modal')) { state.selectedPlayerForModal = null; updateAppUI(); }
            if (e.target.closest('.approve-action-btn')) {
                handleApproveAction(e.target.closest('.approve-action-btn').dataset.id);
                if (state.isDemoMode) saveLocalFallback();
            }
            if (e.target.closest('[data-delete-id]')) {
                const id = e.target.closest('[data-delete-id]').dataset.deleteId;
                executeDelete(id);
                if (state.isDemoMode) saveLocalFallback();
            }
            if (e.target.id === 'save-roster-btn') {
                handleSaveRoster();
            }
            
            // Point Matrix Events
            if (e.target.closest('[data-action="add-rule"]')) {
                const btn = e.target.closest('[data-action="add-rule"]');
                state.pointSystem[btn.dataset.cat].actions.push({ name: "New Action", points: 1 });
                updateAppUI();
            }
            if (e.target.closest('[data-action="remove-rule"]')) {
                const btn = e.target.closest('[data-action="remove-rule"]');
                state.pointSystem[btn.dataset.cat].actions.splice(btn.dataset.act, 1);
                updateAppUI();
            }

            if (e.target.id === 'save-rules-btn') {
                if (!state.isDemoMode) setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'rules' + getSuffix(state.currentSeason)), { matrix: state.pointSystem });
                if (state.isDemoMode) saveLocalFallback();
                showToast("Point Rule Matrix Updated!");
            }
            if (e.target.id === 'start-season-btn') {
                const newSeason = document.getElementById('new-season-input').value.trim();
                if (newSeason && !state.activeSeasons.includes(newSeason)) {
                    state.activeSeasons.push(newSeason);
                    if (!state.isDemoMode) setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'global_meta'), { activeSeasons: state.activeSeasons }, { merge: true });
                    if (state.isDemoMode) saveLocalFallback();
                    showToast(`Season ${newSeason} Portal Opened!`);
                    updateAppUI();
                }
            }
            if (e.target.id === 'hard-reset-btn') {
                if (confirm(`DANGER: Scrub all season achievements for Season ${state.currentSeason}? This cannot be reversed.`)) {
                    if (!state.isDemoMode) {
                        state.actions.forEach(a => deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'actions' + getSuffix(state.currentSeason), a.id)));
                    } else {
                        state.actions = []; updateAppUI(); saveLocalFallback();
                    }
                    showToast("Wipe Initiated.");
                }
            }
            if (e.target.id === 'edit-team-name-btn') { state.editingTeamId = e.target.dataset.team; updateAppUI(); }
            if (e.target.id === 'save-team-name-btn') {
                const val = document.getElementById('team-name-input').value;
                state.teamNames[e.target.dataset.team] = val;
                state.editingTeamId = null;
                if (!state.isDemoMode) setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'teamNames' + getSuffix(state.currentSeason)), { names: state.teamNames }, { merge: true });
                if (state.isDemoMode) saveLocalFallback();
                updateAppUI();
            }
            if (e.target.closest('[data-trivia-ans]') && state.trivia.status === 'playing') {
                const idx = parseInt(e.target.closest('[data-trivia-ans]').dataset.triviaAns);
                state.trivia.selectedOption = idx; state.trivia.status = 'answered';
                if (idx === TRIVIA_POOL[state.trivia.currentQ].answer) {
                    state.triviaLeaderboard[state.currentUser] = (state.triviaLeaderboard[state.currentUser] || 0) + 1;
                    if (!state.isDemoMode) setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'trivia_stats'), { leaderboard: state.triviaLeaderboard }, { merge: true });
                    if (state.isDemoMode) saveLocalFallback();
                }
                updateAppUI();
            }
            if (e.target.id === 'next-trivia-btn' || e.target.id === 'pass-trivia-btn') { pickNextQuestion(); updateAppUI(); }
        });

        document.addEventListener('change', (e) => {
            if (e.target.id === 'player-select') state.selectedPlayer = e.target.value;
            if (e.target.id === 'category-select') { state.selectedCategory = e.target.value; state.selectedActionName = ''; updateAppUI(); }
            if (e.target.id === 'action-select') state.selectedActionName = e.target.value;
            
            // Point Matrix Editor Handlers
            if (e.target.dataset.action === 'update-rule-name') {
                state.pointSystem[e.target.dataset.cat].actions[e.target.dataset.act].name = e.target.value;
            }
            if (e.target.dataset.action === 'update-rule-points') {
                state.pointSystem[e.target.dataset.cat].actions[e.target.dataset.act].points = parseInt(e.target.value) || 0;
            }
        });

        document.addEventListener('submit', (e) => { 
            if (e.target.id === 'log-form') { 
                e.preventDefault(); 
                handleAddAction(); 
            } 
        });

        initApp();
    </script>
</body>
</html>
